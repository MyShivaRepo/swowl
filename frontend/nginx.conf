upstream swowl_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Préserve les double-slashes (ex: https:// dans les IRI)
    merge_slashes off;

    # Proxy API calls to FastAPI backend
    # $request_uri = URI originale non décodée → préserve les %2F et ://
    location /api/ {
        proxy_pass http://swowl_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Serve frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
