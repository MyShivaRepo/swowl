<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWOWL : A Best In Class OWL/SWRL Editor</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app-layout">

  <!-- ── Topbar ── -->
  <header class="topbar">
    <span class="topbar-logo">🦉 SWOWL : A Best In Class OWL/SWRL Editor</span>
    <div class="topbar-nav-hist">
      <button id="nav-back" class="btn-nav-hist" onclick="APP.navigateBack()"    disabled title="Back">◀</button>
      <button id="nav-fwd"  class="btn-nav-hist" onclick="APP.navigateForward()" disabled title="Forward">▶</button>
    </div>
    <div class="global-search-wrap" id="global-search-wrap">
      <svg class="global-search-ico" width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <circle cx="5.5" cy="5.5" r="4.5"/><line x1="9.5" y1="9.5" x2="12" y2="12"/>
      </svg>
      <input id="global-search-input" type="text" placeholder="Search classes, properties, individuals…"
             autocomplete="off" spellcheck="false"
             oninput="GlobalSearch.onInput(this.value)"
             onkeydown="GlobalSearch.onKey(event)"
             onfocus="GlobalSearch.onFocus()"
             onblur="GlobalSearch.onBlur()">
      <span id="global-search-clear" class="global-search-clear" style="display:none" onclick="GlobalSearch.clear()">✕</span>
      <div id="global-search-dropdown" class="global-search-dropdown" style="display:none"></div>
    </div>
    <div class="topbar-nav-hist" style="margin-left:auto">
      <button id="undo-btn" class="btn-nav-hist" onclick="UndoRedo.undo()" disabled title="Undo (Ctrl+Z)" style="font-size:26px;width:38px;height:34px;color:var(--text1);line-height:1">⟲</button>
      <button id="redo-btn" class="btn-nav-hist" onclick="UndoRedo.redo()" disabled title="Redo (Ctrl+Y)" style="font-size:26px;width:38px;height:34px;color:var(--text1);line-height:1">⟳</button>
    </div>
  </header>

  <!-- ── Tab Nav horizontal ── -->
  <nav class="tab-nav">
    <div class="nav-item" data-section="ontologies" onclick="APP.navigate('ontologies')"><svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor" style="vertical-align:middle;margin-right:3px"><circle cx="7" cy="1.5" r="1.5"/><circle cx="1.5" cy="10.5" r="1.5"/><circle cx="12.5" cy="10.5" r="1.5"/><line x1="7" y1="3" x2="2.5" y2="9" stroke="currentColor" stroke-width="1"/><line x1="7" y1="3" x2="11.5" y2="9" stroke="currentColor" stroke-width="1"/><line x1="3" y1="10.5" x2="11" y2="10.5" stroke="currentColor" stroke-width="1"/></svg> Ontologies</div>
    <div class="nav-item" data-section="settings" onclick="APP.navigate('settings')">🛠️ Settings</div>

    <span class="tab-sep"></span>

    <div class="nav-item" data-section="classes" onclick="APP.navigate('classes')">
      <span class="cls-dot"></span> Classes <span class="nav-count" id="nc-classes">0</span>
    </div>
    <div class="nav-item" data-section="object-properties" onclick="APP.navigate('object-properties')">
      <span class="op-prop-dot"></span> ObjectProperties <span class="nav-count" id="nc-ops">0</span>
    </div>
    <div class="nav-item" data-section="datatype-properties" onclick="APP.navigate('datatype-properties')">
      <span class="dp-prop-dot"></span> DatatypeProperties <span class="nav-count" id="nc-dps">0</span>
    </div>
    <div class="nav-item" data-section="annotation-properties" onclick="APP.navigate('annotation-properties')">
      <span class="anno-prop-dot"></span> AnnotationProperties <span class="nav-count" id="nc-annos">0</span>
      <span class="tab-hide-btn" onclick="event.stopPropagation();TabVisibility.hide('annotation-properties')" title="Masquer cet onglet">✕</span>
    </div>
    <div class="nav-item" data-section="individuals" onclick="APP.navigate('individuals')">
      <span class="xsd-dot" style="margin:0"></span> Individuals <span class="nav-count" id="nc-inds">0</span>
      <span class="tab-hide-btn" onclick="event.stopPropagation();TabVisibility.hide('individuals')" title="Masquer cet onglet">✕</span>
    </div>

    <span class="tab-sep"></span>

    <div class="nav-item" data-section="swrl-rules" onclick="APP.navigate('swrl-rules')">
      ⚙️ SWRL Rules <span class="nav-count" id="nc-swrl">0</span>
      <span class="tab-hide-btn" onclick="event.stopPropagation();TabVisibility.hide('swrl-rules')" title="Masquer cet onglet">✕</span>
    </div>
    <div class="nav-item" data-section="views" onclick="APP.navigate('views')">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none" style="vertical-align:middle;margin-right:3px"><ellipse cx="7" cy="5" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="5" r="2" fill="currentColor"/></svg> Views
      <span class="tab-hide-btn" onclick="event.stopPropagation();TabVisibility.hide('views')" title="Masquer cet onglet">✕</span>
    </div>
    <div class="nav-item" data-section="queries" onclick="APP.navigate('queries')">
      🔎 Queries
      <span class="tab-hide-btn" onclick="event.stopPropagation();TabVisibility.hide('queries')" title="Masquer cet onglet">✕</span>
    </div>
    <div class="nav-item" data-section="inferences" onclick="APP.navigate('inferences')">
      🧠 Inferences
      <span class="tab-hide-btn" onclick="event.stopPropagation();TabVisibility.hide('inferences')" title="Masquer cet onglet">✕</span>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main id="main-content">
    <p class="empty">Loading…</p>
  </main>

  <!-- ── Inference Sidebar ── -->
  <aside class="inference-sidebar">
    <div class="inf-sidebar-title">
      <span>🧠 Inferences</span>
      <button class="btn-sm" onclick="InferenceUI.refresh()" title="Recalculate">↻</button>
    </div>
    <div id="inference-panel">
      <p class="empty">Loading…</p>
    </div>
  </aside>

</div>

<!-- ── D3.js (hyperbolic tree view) ── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

<!-- ── Sparnatural (visual SPARQL query builder — v12.2.1 local) ── -->
<link  rel="stylesheet" href="/css/sparnatural.css">
<script src="/js/sparnatural.js"></script>

<!-- ── Scripts ── -->
<script src="/js/api.js?v=62"></script>
<script src="/js/owl_editor.js?v=62"></script>
<script src="/js/swrl_editor.js?v=62"></script>
<script src="/js/sparql_editor.js?v=62"></script>
<script src="/js/inference_ui.js?v=62"></script>
<script src="/js/app.js?v=62"></script>

<script>
// Update navigation counters
function _updateNavCounters() {
  document.getElementById('nc-classes').textContent = APP.state.classes.length;
  document.getElementById('nc-ops').textContent     = APP.state.object_properties.length;
  document.getElementById('nc-dps').textContent     = APP.state.datatype_properties.length;
  document.getElementById('nc-inds').textContent    = APP.state.individuals.length;
  const _ncSword = document.getElementById('nc-swrl'); if (_ncSword) _ncSword.textContent = (APP.state.swrl_rules||[]).length;
  document.getElementById('nc-annos').textContent   = ALL_ANNO_PROPS.length;
}

// Patch APP.refresh to update counters after each refresh
var _origRefresh = APP.refresh.bind(APP);
APP.refresh = async function() {
  await _origRefresh();
  _updateNavCounters();
};

// Patch APP.init to update counters after initialisation
var _origInit = APP.init.bind(APP);
APP.init = async function() {
  TabVisibility.load();
  APP._applyTabVisibility();
  await _origInit();
  _updateNavCounters();
  APP._applyTabVisibility(); // re-apply after nav re-render
};
</script>

</body>
</html>
